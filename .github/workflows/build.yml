name: ci

on: [push, pull_request]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Debug build and tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Generate build config
        run: cmake --preset debug
      - name: Build
        run: cmake --build --preset debug
      - name: Run unit tests
        run: ctest --preset debug -L unit
      - name: Run integration tests
        run: ctest --preset debug -L integration
