name: ci

on: [push, pull_request]

permissions:
  contents: read

jobs:
  build-and-test:
    name: CI / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Configure debug build
        run: cmake --preset debug
      - name: Build debug target
        run: cmake --build --preset debug
      - name: Run unit test suites
        run: ctest --preset debug -L unit --output-on-failure
      - name: Run integration test suites
        run: ctest --preset debug -L integration --output-on-failure
